{{- if .Values.auth.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: auth
  labels:
    app: auth
spec:
  replicas: {{ .Values.auth.replicas }}
  selector:
    matchLabels:
      app: auth
  template:
    metadata:
      labels:
        app: auth
    spec:
      initContainers:
        - name: init-prisma
          image: {{ .Values.auth.image }}
          imagePullPolicy: {{ .Values.global.imagePullPolicy }}
          # prisma.config.ts lives here; migrate must run from this dir so Prisma loads config and sees DATABASE_URL from env.
          workingDir: /app/apps/auth
          command: ["sh", "-c"]
          args:
            - npx prisma migrate deploy
          env:
            {{- include "common.env" . | nindent 12 }}
            - name: DATABASE_URL
              value: {{ printf "postgresql://%s:%s@%s-postgresql.%s.svc.cluster.local:5432/%s" .Values.postgresql.auth.username (.Values.postgresql.auth.password | urlquery) .Release.Name .Release.Namespace .Values.postgresql.auth.database | quote }}
      containers:
        - name: auth
          image: {{ .Values.auth.image }}
          imagePullPolicy: {{ .Values.global.imagePullPolicy }}
          ports:
            - containerPort: {{ .Values.auth.port.http }}
            - containerPort: {{ .Values.auth.port.grpc }}
          env:
            {{- include "common.env" . | nindent 12 }}
            - name: COOKIE_SECRET
              value: {{ .Values.auth.cookieSecret | quote }}
            - name: PORT
              value: {{ .Values.auth.port.http | quote }}
            - name: JWT_SECRET
              value: "{{ .Values.auth.jwt.secret }}"
            - name: JWT_EXPIRES_MS
              value: {{ .Values.auth.jwt.expiresMs | int | toString | quote }}
            - name: AUTH_GRPC_SERVICE_URL
              value: "0.0.0.0:{{ .Values.auth.port.grpc }}"
            - name: DATABASE_URL
              value: {{ printf "postgresql://%s:%s@%s-postgresql.%s.svc.cluster.local:5432/%s" .Values.postgresql.auth.username (.Values.postgresql.auth.password | urlquery) .Release.Name .Release.Namespace .Values.postgresql.auth.database | quote }}
{{- end }}
