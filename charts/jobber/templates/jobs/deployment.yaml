{{- if .Values.jobs.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: jobs
  labels:
    app: jobs
spec:
  replicas: {{ .Values.jobs.replicas }}
  selector:
    matchLabels:
      app: jobs
  template:
    metadata:
      labels:
        app: jobs
    spec:
      initContainers:
        - name: init-prisma
          image: {{ .Values.jobs.image }}
          imagePullPolicy: {{ .Values.global.imagePullPolicy }}
          # prisma.config.ts lives here; migrate must run from this dir so Prisma loads config and sees DATABASE_URL from env.
          workingDir: /app/apps/jobs
          command: ["sh", "-c"]
          args:
            - npx prisma migrate deploy
          env:
            {{- include "common.env" . | nindent 12 }}
            - name: DATABASE_URL
              value: {{ printf "postgresql://%s:%s@%s-postgresql.%s.svc.cluster.local:5432/%s" .Values.postgresql.jobs.username (.Values.postgresql.jobs.password | urlquery) .Release.Name .Release.Namespace .Values.postgresql.jobs.database | quote }}
      containers:
        - name: jobs
          image: {{ .Values.jobs.image }}
          imagePullPolicy: {{ .Values.global.imagePullPolicy }}
          volumeMounts:
            - name: uploads-volume
              mountPath: /app/apps/jobs/uploads
          ports:
            - containerPort: {{ .Values.jobs.port.http }}
            - containerPort: {{ .Values.jobs.port.grpc }}
          env:
            {{- include "common.env" . | nindent 12 }}
            - name: COOKIE_SECRET
              value: {{ .Values.jobs.cookieSecret | quote }}
            - name: PORT
              value: {{ .Values.jobs.port.http | quote }}
            - name: AUTH_GRPC_SERVICE_URL
              value: "auth-grpc:{{ .Values.auth.port.grpc }}"
            - name: JOBS_GRPC_SERVICE_URL
              value: "0.0.0.0:{{ .Values.jobs.port.grpc }}"
            - name: DATABASE_URL
              value: {{ printf "postgresql://%s:%s@%s-postgresql.%s.svc.cluster.local:5432/%s" .Values.postgresql.jobs.username (.Values.postgresql.jobs.password | urlquery) .Release.Name .Release.Namespace .Values.postgresql.jobs.database | quote }}
      volumes:
        - name: uploads-volume
          persistentVolumeClaim:
            claimName: uploads-pvc
{{- end }}
